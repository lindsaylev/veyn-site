<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veyn — your portfolio, unified</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#F2EDE6; --accent:#4A5E4A; --tan:#8B7355; --card:#EDE8DF; --tan2:#B5A08A; --brown:#6B5744; --text:#1A1A1A; }
    *{box-sizing:border-box; margin:0; padding:0; -webkit-font-smoothing:antialiased}
    html,body{height:100%;font-family:Plus Jakarta Sans,system-ui;background:var(--bg);color:var(--text)}

    /* Header */
    .top-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:40}
    .brand{font-family:Playfair Display,serif;font-size:24px;color:var(--accent);letter-spacing:1px}
    .header-actions{display:flex;gap:8px;align-items:center}
    .settings-btn{border:1px solid #ddd;border-radius:8px;padding:6px 12px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit}
    .settings-btn:hover{background:#f5f0ea}
    .avatar{width:32px;height:32px;border-radius:50%;background:var(--card)}

    /* Layout */
    .layout{display:flex;min-height:calc(100vh - 52px)}

    /* Sidebar */
    .sidebar{width:180px;background:#fff;border-right:1px solid #eee;padding:12px 8px;flex-shrink:0}
    .sidebar-label{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--tan);padding:8px 10px 4px}
    .sidebar ul{list-style:none;padding:0;margin:0}
    .sidebar li{padding:10px 12px;cursor:pointer;font-size:14px;font-weight:500;border:1px solid #eee;border-radius:8px;margin:4px 0;transition:all .15s}
    .sidebar li:hover{background:#f5f0ea;border-color:#ddd}
    .sidebar li.active{background:var(--accent);color:#fff;border-color:var(--accent)}

    /* Content */
    .content{flex:1;padding:24px;max-width:900px}

    /* Hero */
    .hero{text-align:center;padding:16px 0 28px}
    .hero-label{font-size:12px;color:var(--tan);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
    .hero-total{font-family:Playfair Display,serif;font-size:48px;line-height:1.1}
    .hero-updated{font-size:12px;color:#999;margin-top:6px}

    /* Card */
    .card{background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(107,87,68,.06);overflow:hidden}

    /* Holding row */
    .holding-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;border-bottom:1px solid #f0ece6;transition:background .15s}
    .holding-row:hover{background:#faf8f4}
    .coin-left{display:flex;align-items:center;gap:12px}
    .coin-icon{width:34px;height:34px;border-radius:10px;background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
    .coin-name{font-weight:600;font-size:14px}
    .coin-amount{font-size:12px;color:#888;margin-top:2px}
    .coin-value{font-weight:600;font-size:14px}
    .chevron{font-size:11px;color:#bbb;margin-left:8px;transition:transform .2s}
    .chevron.open{transform:rotate(90deg)}

    /* Badges */
    .badge{font-size:10px;padding:3px 7px;border-radius:99px;font-weight:700;letter-spacing:.3px;vertical-align:middle;margin-left:6px}
    .badge-sc{background:var(--accent);color:#fff}
    .badge-cu{background:var(--tan2);color:#fff}

    /* Sources */
    .sources{display:none;background:#faf8f4;padding:4px 18px 10px 64px}
    .sources.open{display:block}
    .source-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0ece6}
    .source-row:last-child{border-bottom:none}
    .source-name{font-size:13px}
    .source-right{display:flex;align-items:center;gap:10px}
    .source-amount{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums}
    .visit-link{font-size:11px;color:var(--accent);text-decoration:none;padding:3px 8px;border:1px solid var(--accent);border-radius:6px;transition:all .15s}
    .visit-link:hover{background:var(--accent);color:#fff}

    /* Settings panel */
    .panel{position:fixed;right:20px;top:56px;width:240px;background:#fff;border:1px solid #ddd;border-radius:10px;box-shadow:0 8px 20px rgba(0,0,0,.12);padding:8px;display:none;z-index:50}
    .panel.active{display:block}
    .panel .row{padding:10px 12px;font-size:13px;cursor:pointer;border-radius:6px;transition:background .15s}
    .panel .row:hover{background:#f5f0ea}

    /* Refresh */
    .refresh{position:fixed;bottom:24px;right:24px;width:44px;height:44px;background:var(--text);color:#fff;border:none;border-radius:50%;font-size:18px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.15);transition:transform .2s}
    .refresh:active{transform:scale(.92)}

    /* Page stub */
    .page-stub{text-align:center;padding:60px 20px;color:#aaa;font-size:15px}

    /* Responsive */
    @media(max-width:700px){.layout{flex-direction:column}.sidebar{width:auto;border-right:0;border-bottom:1px solid #eee;padding:8px}.sidebar ul{display:flex;gap:4px;overflow-x:auto}.sidebar li{white-space:nowrap;margin:0}.content{padding:16px}.hero-total{font-size:38px}.sources{padding-left:50px}.panel{right:10px;left:10px;width:auto}}
  </style>
</head>
<body>
  <div class="top-header">
    <div class="brand">Veyn</div>
    <div class="header-actions">
      <button class="settings-btn" onclick="togglePanel()">Settings</button>
      <div class="avatar"></div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-label">Navigate</div>
      <ul id="nav">
        <li class="active" onclick="showPage('summary')">Summary</li>
        <li onclick="showPage('portfolio')">Crypto Portfolio</li>
        <li onclick="showPage('strategies')">Strategies</li>
        <li onclick="showPage('performance')">Performance</li>
      </ul>
    </aside>

    <main class="content" id="main"></main>
  </div>

  <div class="panel" id="settingsPanel">
    <div class="row">View / Edit Profile</div>
    <div class="row">Theme: Light / Dark</div>
    <div class="row">CT Badge: On</div>
    <div class="row">About / Help</div>
  </div>

  <button class="refresh" onclick="simulateRefresh()" title="Refresh prices">&#x21bb;</button>

  <script>
    const holdings = [
      { coin:'Bitcoin', symbol:'BTC', icon:'\u20bf', amount:0.5, totalUSD:35850, sources:[
        {name:'MetaMask',type:'sc',amount:'$12,400',url:'https://metamask.io'},
        {name:'Phantom',type:'sc',amount:'$8,200',url:'https://phantom.app'},
        {name:'Trust Wallet',type:'sc',amount:'$3,100',url:'https://trustwallet.com'},
        {name:'Ledger Live',type:'sc',amount:'$6,750',url:'https://www.ledger.com'},
        {name:'Coinbase Wallet',type:'sc',amount:'$1,400',url:'https://wallet.coinbase.com'},
        {name:'Coinbase',type:'cu',amount:'$2,500',url:'https://www.coinbase.com'},
        {name:'Binance',type:'cu',amount:'$1,200',url:'https://www.binance.com'},
        {name:'Kraken',type:'cu',amount:'$300',url:'https://www.kraken.com'}
      ]},
      { coin:'Ethereum', symbol:'ETH', icon:'\u039e', amount:2.0, totalUSD:4200, sources:[
        {name:'MetaMask',type:'sc',amount:'$1,800',url:'https://metamask.io'},
        {name:'Phantom',type:'sc',amount:'$400',url:'https://phantom.app'},
        {name:'Trust Wallet',type:'sc',amount:'$200',url:'https://trustwallet.com'},
        {name:'Ledger Live',type:'sc',amount:'$600',url:'https://www.ledger.com'},
        {name:'Coinbase Wallet',type:'sc',amount:'$100',url:'https://wallet.coinbase.com'},
        {name:'Coinbase',type:'cu',amount:'$800',url:'https://www.coinbase.com'},
        {name:'Binance',type:'cu',amount:'$200',url:'https://www.binance.com'},
        {name:'Kraken',type:'cu',amount:'$100',url:'https://www.kraken.com'}
      ]},
      { coin:'Solana', symbol:'SOL', icon:'S', amount:15, totalUSD:1950, sources:[
        {name:'Phantom',type:'sc',amount:'$900',url:'https://phantom.app'},
        {name:'MetaMask',type:'sc',amount:'$250',url:'https://metamask.io'},
        {name:'Trust Wallet',type:'sc',amount:'$150',url:'https://trustwallet.com'},
        {name:'Ledger Live',type:'sc',amount:'$200',url:'https://www.ledger.com'},
        {name:'Coinbase Wallet',type:'sc',amount:'$50',url:'https://wallet.coinbase.com'},
        {name:'Coinbase',type:'cu',amount:'$250',url:'https://www.coinbase.com'},
        {name:'Binance',type:'cu',amount:'$100',url:'https://www.binance.com'},
        {name:'Kraken',type:'cu',amount:'$50',url:'https://www.kraken.com'}
      ]}
    ];

    function portfolioHTML(){
      return '<section class="hero"><div class="hero-label">Total Balance</div><div class="hero-total" id="totalValue">$42,000.00</div><div class="hero-updated" id="lastUpdated">Last updated: Just now</div></section><section class="card" id="holdingsCard">' +
        holdings.map((h,i) => {
          const srcRows = h.sources.map(s =>
            '<div class="source-row"><div class="source-name">' + s.name + ' <span class="badge ' + (s.type==='sc'?'badge-sc':'badge-cu') + '">' + (s.type==='sc'?'Self-Custody':'Custodial') + '</span></div><div class="source-right"><span class="source-amount">' + s.amount + '</span><a class="visit-link" href="' + s.url + '" target="_blank">Visit</a></div></div>'
          ).join('');
          return '<div><div class="holding-row" onclick="toggle(' + i + ')"><div class="coin-left"><div class="coin-icon">' + h.icon + '</div><div><div class="coin-name">' + h.coin + ' <span class="badge badge-sc">Self-Custody</span></div><div class="coin-amount">' + h.amount + ' ' + h.symbol + '</div></div></div><div style="display:flex;align-items:center"><span class="coin-value">$' + h.totalUSD.toLocaleString() + '</span><span class="chevron" id="chev-' + i + '">&#x25B8;</span></div></div><div class="sources" id="src-' + i + '">' + srcRows + '</div></div>';
        }).join('') + '</section>';
    }

    function showPage(page){
      const main = document.getElementById('main');
      document.querySelectorAll('#nav li').forEach(li => li.classList.remove('active'));
      event.target.classList.add('active');

      if(page === 'summary' || page === 'portfolio'){
        main.innerHTML = portfolioHTML();
      } else if(page === 'strategies'){
        main.innerHTML = '<div class="page-stub">Strategies coming soon.</div>';
      } else if(page === 'performance'){
        main.innerHTML = '<div class="page-stub">Performance analytics coming soon.</div>';
      }
    }

    function toggle(i){
      const src = document.getElementById('src-' + i);
      const chev = document.getElementById('chev-' + i);
      src.classList.toggle('open');
      chev.classList.toggle('open');
    }

    function togglePanel(){
      document.getElementById('settingsPanel').classList.toggle('active');
    }

    function simulateRefresh(){
      const banner = document.getElementById('banner');
      const updated = document.getElementById('lastUpdated');
      if(updated) updated.textContent = 'Last updated: Just now';
    }

    // Default to Summary
    document.getElementById('main').innerHTML = portfolioHTML();
  </script>
</body>
</html>
