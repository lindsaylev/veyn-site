<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
  <title>Veyn – Mock v4.3</title>
  <link href=\"https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap\" rel=\"stylesheet\">
  <style>
    :root{ --bg:#F2EDE6; --accent:#4A5E4A; --tan:#8B7355; --card:#EDE8DF; --tan2:#B5A08A; --brown:#6B5744; --text:#1A1A1A; }
    *{box-sizing:border-box} body{margin:0;font-family:Plus Jakarta Sans, system-ui;background:var(--bg);color:var(--text)}
    .top-header{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;background:#fff;border-bottom:1px solid #eee;position:sticky;top:0;z-index:40}
    .brand{font-family:Playfair Display, serif;font-size:26px;color:var(--accent)}
    .avatar{ width:32px; height:32px; border-radius:6px; background:#ddd }
    .layout{ display:flex; min-height:calc(100vh - 54px); }
    .sidebar{ width:180px; background:#fff; border-right:1px solid #eee; padding:12px; flex-shrink:0 }
    .sidebar h3{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--tan); margin:8px 0 8px }
    .sidebar ul{ list-style:none; padding:0; margin:0 }
    .sidebar li{ padding:8px 10px; border-radius:6px; cursor:pointer; border:1px solid #eee; margin:6px 0; font-size:13px }
    .sidebar li:hover{ background:#f5f0ea }
    .sidebar li.active{ background:var(--accent); color:#fff; font-weight:600 }
    .content{ flex:1; padding:20px; }
    .hero{ text-align:center; padding:6px 0 18px; }
    .hero-label{ font-size:12px; color:var(--tan); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px }
    .hero-total{ font-family:Playfair Display,serif; font-size:48px; line-height:1.1 }
    .hero-updated{ font-size:12px; color:#999; }
    .card{ background:#fff; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.06); overflow:hidden; margin-top:8px; }
    .section{ padding:8px 0; }
    .hint{ color:#666; font-size:12px; text-align:center; padding:6px 0; }
    /* Strategy cards */
    .strategy-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; padding:12px; }
    .card-strategy{ background:#fff; border:1px solid #eee; border-radius:12px; padding:12px; }
    .card-strategy h4{ margin:6px 0 6px; font-size:14px; }
    .card-strategy p{ font-size:12px; color:#555; }
    .cta{ display:inline-block; padding:8px 12px; border-radius:6px; background:var(--accent); color:#fff; text-decoration:none; font-weight:600; font-size:12px; }
  </style>
</head>
<body>
  <header class=\"top-header\">
    <div class=\"brand\">Veyn</div>
    <div class=\"header-actions\">
      <button class=\"settings\" onclick=\"togglePanel()\">Settings</button>
      <div class=\"avatar\" aria-label=\"User\"></div>
    </div>
  </header>
  <div class=\"layout\">
    <aside class=\"sidebar\" aria-label=\"navigation\">
      <h3>Navigate</h3>
      <ul>
        <li class=\"active\" onclick=\"setView('summary')\">Summary</li>
        <li onclick=\"setView('portfolio')\">Crypto Portfolio</li>
        <li onclick=\"setView('strategies')\">Strategies</li>
        <li onclick=\"setView('performance')\">Performance</li>
      </ul>
    </aside>
    <main class=\"content\" id=\"main\"></main>
  </div>
  <div class=\"panel\" id=\"settingsPanel\" aria-label=\"settings-panel\">
    <div class=\"row\">View Profile</div>
    <div class=\"row\">Theme: Light</div>
    <div class=\"row\">CT Badge: On</div>
    <div class=\"row\">Help</div>
  </div>
  <button class=\"plus\" title=\"New Crypto Portfolio\" onclick=\"alert('New portfolio draft created (mock)')\">+</button>
  <script>
    const data4 = [
      { coin: 'Bitcoin', sym:'BTC', icon:'\u20bf', amt:0.5, total:35850,
        sources: [
          {name:'MetaMask', type:'sc', val:'$12,400', perf:'+2.4%', link:'https://metamask.io'},
          {name:'Phantom', type:'sc', val:'$8,200', perf:'+1.1%', link:'https://phantom.app'},
          {name:'Trust Wallet', type:'sc', val:'$3,100', perf:'+0.8%', link:'https://trustwallet.com'}
        ]
      },
      { coin: 'Ethereum', sym:'ETH', icon:'\u039e', amt:2.0, total:4200,
        sources: [
          {name:'MetaMask', type:'sc', val:'$1,800', perf:'-0.5%', link:'https://metamask.io'},
          {name:'Ledger', type:'sc', val:'$1,200', perf:'-0.2%', link:'https://ledger.com'},
          {name:'Kraken', type:'cu', val:'$1,200', perf:'-0.6%', link:'https://kraken.com'}
        ]
      },
      { coin: 'Solana', sym:'SOL', icon:'S', amt:150, total:19500,
        sources: [
          {name:'Phantom', type:'sc', val:'$12,500', perf:'+5.2%', link:'https://phantom.app'},
          {name:'Coinbase', type:'cu', val:'$7,000', perf:'+4.8%', link:'https://coinbase.com'}
        ]
      }
    ];

    function render(){
      const main = document.getElementById('main');
      main.innerHTML = `
        <section class=\"hero\">\n          <div class=\"hero-label\">Total Balance</div>\n          <div class=\"hero-total\" id=\"totalValue\">$42,000.00</div>\n          <div class=\"hero-updated\">Last updated: Just now</div>\n        </section>\n        <section class=\"card\">` + data4.map((h,i) => `\n          <div class=\"holding-row\" onclick=\"toggle(${i})\">\n            <div class=\"coin-left\">\n              <div class=\"icon\">${h.icon}</div>\n              <div>\n                <div class=\"name\">${h.coin} <span class=\"badge badge-sc\">Self-Custody</span></div>\n                <div class=\"amount\">${h.amt} ${h.sym}</div>\n              </div>\n            </div>\n            <div class=\"source-total\">$${h.total.toLocaleString()} </div>\n          </div>\n          <div class=\"sources\" id=\"src-${i}\">` + h.sources.map(s => `\n            <div class=\"source-row\">\n              <div class=\"source-meta\">\n                <span class=\"name\">${s.name}</span> <span class=\"badge ${s.type==='sc'?'badge-sc':'badge-cu'}\">${s.type==='sc'?'Self-Custody':'Custodial'}</span> <span class=\"type-label\">${s.type==='sc'?'Wallet':'Exchange'}</span> - <span class=\"source-amount\">${s.val}</span> <a href=\"${s.link}\" target=\"_blank\" class=\"visit\">Visit</a>\n            </div>\n          </div>`).join('') + `\n        </div>`).join('') + `\n        </section>`;\n    }\n
    function toggle(i){\n      document.getElementById('src-' + i).classList.toggle('open');\n    }\n
    // Init content with 4.2 data\n    render();\n  </script>\n</body>\n</html>
