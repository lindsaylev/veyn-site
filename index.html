<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veyn – Mock v4.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#F2EDE6; --accent:#4A5E4A; --tan:#8B7355; --card:#EDE8DF; --tan2:#B5A08A; --brown:#6B5744; --text:#1A1A1A; }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Plus Jakarta Sans, system-ui;background:var(--bg);color:var(--text)}
    header{padding:14px 20px; display:flex; justify-content:space-between; align-items:center; max-width:1100px; margin:0 auto}
    .brand{font-family:Playfair Display, serif; font-size:28px; color:var(--accent)}
    .avatar{ width:32px; height:32px; border-radius:6px; background:#ddd }
    .layout{ display:flex; min-height:100vh; }
    .sidebar{ width:240px; background:#fff; border-right:1px solid #eee; padding:16px; box-shadow:0 4px 12px rgba(0,0,0,.04) }
    .sidebar h3{ font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--tan); margin:8px 0 12px }
    .sidebar ul{ list-style:none; padding:0; margin:0; }
    .sidebar li{ padding:10px 6px; border-radius:6px; cursor:pointer; }
    .sidebar li:hover{ background:#f5f0ea }
    .content{ flex:1; padding:20px; }
    .header-actions{ display:flex; gap:8px; align-items:center }
    .menu{ border:1px solid #ddd; border-radius:8px; padding:6px 10px; background:#fff; cursor:pointer }
    .panel{ position: fixed; right: 20px; top: 64px; width: 260px; background:#fff; border:1px solid #ddd; border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.15); padding:12px; display:none; z-index: 50 }
    .panel.active{ display:block; }
    .panel .row{ padding:6px 0; border-bottom:1px solid #eee; font-size:13px }
    .panel .row:last-child{ border-bottom:0 }
    .section{ margin-bottom:18px }
    .total{ font-family:Playfair Display, serif; font-size:46px; text-align:center; margin:16px 0 }
    .badge{ padding:4px 8px; border-radius:999px; font-weight:700; font-size:11px; }
    .badge-sc{ background:var(--accent); color:#fff }
    .badge-cu{ background:var(--tan); color:#fff }
    .sources{ display:none; padding-left:42px; padding-bottom:8px; }
    .source{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee }
    .source a{ font-size:12px; color:var(--accent); text-decoration:none }
    .visit{ font-size:12px }
    @media (max-width: 900px){ .layout{ flex-direction:column; } .sidebar{ width:auto; border-right:0; } .panel{ right:10px; left:10px; width:auto; } }
  </style>
</head>
<body>
  <header>
    <div class="brand">Veyn</div>
    <div class="header-actions"><button class="menu" onclick="togglePanel()">Settings</button><div class="avatar" aria-label="User"></div></div>
  </header>
  <div class="layout">
    <aside class="sidebar" aria-label="navigation">
      <h3>Navigate</h3>
      <ul>
        <li>Summary</li>
        <li>Crypto Portfolio</li>
        <li>Strategies</li>
        <li>Performance</li>
      </ul>
    </aside>
    <main class="content">
      <section class="hero" aria-label="summary">
        <div class="total" id="totalValue">$42,000.00</div>
        <div class="updated" id="lastUpdated">Last updated: Just now</div>
      </section>
      <section class="card" aria-label="holdings">
        <div class="holding-row" style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee;">
          <div style="display:flex;gap:8px;align-items:center">
            <div class="icon" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:#f0f0f0">₿</div>
            <div>Bitcoin <span class="badge badge-sc">Summary</span></div>
          </div>
          <div class="source-total">$35,850</div>
        </div>
      </section>
    </main>
  </div>
  <div class="panel" id="settingsPanel" aria-label="settings-panel">
    <div class="row">View/Edit Profile</div>
    <div class="row">Theme: Light/Dark</div>
    <div class="row">CT Badge: On</div>
    <div class="row">About / Help</div>
  </div>
  <button class="refresh" onclick="simulateRefresh()" title="Refresh prices">&#x21bb;</button>
  <script>
    function toggleOpen(el){ const s = el.nextElementSibling; if (s) s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
    function togglePanel(){ const p = document.getElementById('settingsPanel'); p.classList.toggle('active'); }
    function render(){ /* placeholder */ }
    render();
  </script>
</body>
</html>
