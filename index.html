<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veyn</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#F2EDE6; --accent:#4A5E4A; --tan:#8B7355; --card:#EDE8DF; --tan2:#B5A08A; --brown:#6B5744; --text:#1A1A1A; }
    *{box-sizing:border-box} body{margin:0;height:100%;font-family:Plus Jakarta Sans, system-ui;background:var(--bg);color:var(--text)}
    /* Header */
    .top-header{padding:14px 20px; display:flex; align-items:center; justify-content:space-between; background:#fff; border-bottom:1px solid #eee; position:sticky; top:0; z-index:40}
    .brand{font-family:Playfair Display, serif; font-size:26px; color:var(--accent);letter-spacing:1px}
    .avatar{ width:32px; height:32px; border-radius:6px; background:#ddd }
    /* Layout */
    .layout{ display:flex; min-height:calc(100vh - 54px); }
    .sidebar{ width:190px; background:#fff; border-right:1px solid #eee; padding:12px; flex-shrink:0; box-shadow:0 4px 12px rgba(0,0,0,.04) }
    .sidebar h3{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--tan); margin:12px 0 8px }
    .sidebar ul{ list-style:none; padding:0; margin:0 }
    .sidebar li{ padding:10px 12px; border-radius:6px; border:1px solid #eee; margin:6px 0; cursor:pointer; font-size:13px }
    .sidebar li:hover{ background:#f5f0ea }
    .sidebar li.active{ background:var(--accent); color:#fff; font-weight:600 }
    .content{ flex:1; padding:24px; }
    /* Settings panel */
    .panel{ position: fixed; right: 20px; top: 64px; width: 240px; background:#fff; border:1px solid #ddd; border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.15); padding:12px; display:none; z-index:50 }
    .panel.active{ display:block; }
    .panel .row{ padding:6px 0; border-bottom:1px solid #eee; font-size:13px }
    .panel .row:last-child{ border-bottom:0 }
    /* Hero + portfolio */
    .hero{ text-align:center; padding:6px 0 18px; }
    .hero-label{ font-size:12px; color:var(--tan); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px }
    .hero-total{ font-family:Playfair Display, serif; font-size:48px; line-height:1.1 }
    .hero-updated{ font-size:12px; color:#999; }
    .card{ background:#fff; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.06); overflow:hidden; margin-top:12px; }
    .holding-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-top:1px solid #eee; cursor:default; }
    .coin{ display:flex; align-items:center; gap:10px; }
    .icon{ width:36px; height:36px; border-radius:10px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-weight:700 }
    .name{ font-weight:600; }
    .badge{ padding:4px 8px; border-radius:999px; font-weight:700; font-size:11px; margin-left:6px; }
    .badge-sc{ background:var(--accent); color:#fff }
    .badge-cu{ background:var(--tan2); color:#fff }
    .details{ padding:0 16px 12px; }
    .source{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee; }
    .source:last-child{ border-bottom:0 }
    .source a{ color:var(--accent); text-decoration:none }
    .source .pct{ font-weight:600; color:#0a0; }
    .visit{ font-size:10px; color:var(--accent); text-decoration:none;border:1px solid var(--accent);padding:2px 6px;border-radius:4px }
    .visit:hover{ background:var(--accent); color:#fff }
    /* Settings panel */
    .panel{ position: fixed; right: 20px; top: 56px; width:240px; background:#fff; border:1px solid #ddd; border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.12); padding:8px; display:none;z-index:50 }
    .panel.active{ display:block }
    .row{ padding:8px 10px; font-size:13px; cursor:pointer; border-bottom:1px solid #f5f0ea }
    .row:last-child{ border-bottom:0 }
    .row:hover{ background:#f5f0ea }
    /* Responsive */
    @media(max-width:700px){ .layout{flex-direction:column}.sidebar{width:auto;border-right:0;border-bottom:1px solid #eee;padding:8px 16px}.sidebar ul{display:flex;gap:8px;overflow-x:auto}.sidebar li{white-space:nowrap;margin:0}}
  </style>
</head>
<body>
  <div class="top-header">
    <div class="brand">Veyn</div>
    <div class="header-actions">
      <button class="settings" onclick="togglePanel()">Settings</button>
      <div class="avatar" aria-label="User"></div>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar" aria-label="navigation">
      <h3>Navigate</h3>
      <ul>
        <li class="active" onclick="setView('summary')">Summary</li>
        <li onclick="setView('portfolio')">Crypto Portfolio</li>
        <li onclick="setView('strategies')">Strategies</li>
        <li onclick="setView('performance')">Performance</li>
      </ul>
    </aside>
    <main class="content" id="main"></main>
  </div>

  <div class="panel" id="settingsPanel" aria-label="settings-panel">
    <div class="row">View Profile</div>
    <div class="row">Theme: Light</div>
    <div class="row">CT Badge: On</div>
    <div class="row">Help</div>
  </div>

  <script>
    const data = [
      {
        coin: 'Bitcoin', sym:'BTC', icon:'\u20bf', amt:0.5, total:35850,
        sources: [
          {name:'MetaMask', type:'sc', val:'$12,400', perf:'+2.4%', link:'https://metamask.io'},
          {name:'Phantom', type:'sc', val:'$8,200', perf:'+1.1%', link:'https://phantom.app'},
          {name:'Trust Wallet', type:'sc', val:'$3,100', perf:'+0.8%', link:'https://trustwallet.com'}
        ]
      },
      {
        coin: 'Ethereum', sym:'ETH', icon:'\u039e', amt:2.0, total:4200,
        sources: [
          {name:'MetaMask', type:'sc', val:'$1,800', perf:'-0.5%', link:'https://metamask.io'},
          {name:'Ledger', type:'sc', val:'$1,200', perf:'-0.2%', link:'https://ledger.com'},
          {name:'Kraken', type:'cu', val:'$1,200', perf:'-0.6%', link:'https://kraken.com'}
        ]
      },
      {
        coin: 'Solana', sym:'SOL', icon:'S', amt:150, total:19500,
        sources: [
          {name:'Phantom', type:'sc', val:'$12,500', perf:'+5.2%', link:'https://phantom.app'},
          {name:'Coinbase', type:'cu', val:'$7,000', perf:'+4.8%', link:'https://coinbase.com'}
        ]
      }
    ];

    function render(){
      const main = document.getElementById('main');
      main.innerHTML = `
        <section class=\"hero\">\n          <div class=\"hero-label\">Total Balance</div>\n          <div class=\"hero-total\" id=\"totalValue\">$42,000.00</div>\n          <div class=\"hero-updated\">Last updated: Just now</div>\n        </section>\n        <section class=\"card\">` + data.map((h,i) => `\n          <div class=\"holding-row\" onclick=\"toggle(${i})\">\n            <div class=\"coin-left\">\n              <div class=\"icon\">${h.icon}</div>\n              <div>\n                <div class=\"name\">${h.coin} <span class=\"badge badge-sc\">Self-Custody</span></div>\n                <div class=\"amount\">${h.amt} ${h.sym}</div>\n              </div>\n            </div>\n            <div class=\"source-total\">$${h.total.toLocaleString()} </div>\n          </div>\n          <div class=\"sources\" id=\"src-${i}\">` + h.sources.map(s => `\n            <div class=\"source-row\">\n              <span class=\"source-name\">${s.name}</span> <span class=\"badge ${s.type==='sc'?'badge-sc':'badge-cu'}\">${s.type==='sc'?'Self-Custody':'Custodial'}</span> <span class=\"type-label\">${s.type==='sc'?'Wallet':'Exchange'}</span> - <span class=\"source-amount\">${s.val}</span> <a href=\"${s.link}\" target=\"_blank\" class=\"visit\">Visit</a>\n            </div>`).join('') + `\n          </div>`).join('') + `\n        </section>`;\n    }\n
    function toggle(i){\n      document.getElementById('src-' + i).classList.toggle('open');\n    }\n
    // Init
    render();\n  </script>\n</body>\n</html>
