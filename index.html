<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veyn – Mock v4.2</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{ --bg:#F2EDE6; --accent:#4A5E4A; --tan:#8B7355; --card:#EDE8DF; --tan2:#B5A08A; --brown:#6B5744; --text:#1A1A1A; }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Plus Jakarta Sans, system-ui;background:var(--bg);color:var(--text)}
    /* Header */
    .top-header{padding:14px 20px; display:flex; justify-content:space-between; align-items:center; background:#fff; border-bottom:1px solid #eee; position:sticky; top:0; z-index:40}
    .brand{font-family:Playfair Display, serif; font-size:26px; color:var(--accent)}
    .avatar{ width:32px; height:32px; border-radius:6px; background:#ddd }
    /* Layout */
    .layout{ display:flex; min-height: calc(100vh - 54px); }
    .sidebar{ width: 190px; background:#fff; border-right:1px solid #eee; padding:12px; box-shadow:0 4px 12px rgba(0,0,0,.04); }
    .sidebar h3{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--tan); margin:8px 0 12px }
    .sidebar ul{ list-style:none; padding:0; margin:0 }
    .sidebar li{ padding:8px 10px; border-radius:6px; border:1px solid #eee; margin:6px 0; cursor:pointer; }
    .sidebar li.active{ background:var(--accent); color:#fff; }
    .content{ flex:1; padding:20px; }
    /* Settings panel */
    .panel{ position: fixed; right: 20px; top: 64px; width: 240px; background:#fff; border:1px solid #ddd; border-radius:10px; box-shadow:0 8px 20px rgba(0,0,0,.15); padding:10px; display:none; z-index: 50 }
    .panel.active{ display:block; }
    .panel .row{ padding:8px 6px; border-bottom:1px solid #eee; font-size:13px }
    .panel .row:last-child{ border-bottom:0 }
    /* Hero / portfolio */
    .hero{ text-align:center; padding:8px 0 16px; }
    .hero-label{ font-size:12px; color:var(--tan); text-transform:uppercase; letter-spacing:1px; }
    .hero-total{ font-family:Playfair Display, serif; font-size:46px; margin:6px 0; }
    .hero-updated{ font-size:12px; color:#999; }
    .card{ background:#fff; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.06); overflow:hidden; margin-top:8px; }
    .holding{ display:flex; flex-direction:column; }
    .holding-row{ display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-top:1px solid #eee; cursor:default; }
    .coin{ display:flex; align-items:center; gap:10px; }
    .icon{ width:30px; height:30px; border-radius:8px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; font-weight:700 }
    .name{ font-weight:600; }
    .badge{ font-size:11px; padding:4px 8px; border-radius:999px; font-weight:700; margin-left:6px }
    .badge.sc{ background:var(--accent); color:#fff }
    .badge.cu{ background:var(--tan); color:#fff }
    .details{ padding:0 16px 12px; }
    .source{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #eee; }
    .source:last-child{ border-bottom:0 }
    .source a{ color:var(--accent); text-decoration:none }
    .source .pct{ font-weight:600; color:#0a0; }
    .filter{ display:flex; justify-content:flex-end; gap:8px; padding:6px 0 12px; }
    .chip{ padding:6px 12px; border-radius:999px; border:1px solid #ddd; font-size:12px; cursor:pointer; }
    .chip.active{ background:var(--accent); color:#fff; }
    .plus{ position: fixed; right: 28px; top: 120px; width: 28px; height: 28px; border-radius:6px; background:var(--accent); color:#fff; font-weight:700; font-size:20px; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 12px rgba(0,0,0,.15); }
  </style>
</head>
<body>
  <header class="top-header">
    <div class="brand">Veyn</div>
    <div class="header-actions">
      <button class="menu" onclick="togglePanel()">Settings</button>
      <div class="avatar" aria-label="User"></div>
    </div>
  </header>
  <div class="layout">
    <aside class="sidebar" aria-label="navigation">
      <h3>Navigate</h3>
      <ul>
        <li class="active">Summary</li>
        <li>Crypto Portfolio</li>
        <li>Strategies</li>
        <li>Performance</li>
      </ul>
    </aside>
    <main class="content">
      <section class="hero" aria-label="summary">
        <div class="hero-label">Total Balance</div>
        <div class="hero-total" id="totalValue">$42,000.00</div>
        <div class="hero-updated" id="updated">Last updated: Just now</div>
      </section>
      <section class="card" aria-label="holdings">
        <div class="holding-row" style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #eee;">
          <div style="display:flex;gap:8px;align-items:center">
            <div class="icon" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:#f0f0f0">₿</div>
            <div>Bitcoin <span class="badge badge-sc">Summary</span></div>
          </div>
          <div class="source-total">$35,850</div>
        </div>
      </section>
    </main>
  </div>
  <div class="panel" id="settingsPanel" aria-label="settings-panel">
    <div class="row">View / Edit Profile</div>
    <div class="row">Theme: Light / Dark</div>
    <div class="row">CT Badge: On</div>
    <div class="row">About / Help</div>
  </div>
  <button class="plus" title="New Crypto Portfolio" onclick="alert('New portfolio draft created (mock)')">+</button>
  <script>
    function toggleOpen(el){ const s = el.nextElementSibling; if (s) s.style.display = s.style.display === 'block' ? 'none' : 'block'; }
    function togglePanel(){ const p = document.getElementById('settingsPanel'); p.classList.toggle('active'); }
    function showPage(page){ /* stub for now */ }
    // Initialize content
    document.getElementById('totalValue').textContent = '$42,000.00';
  </script>
</body>
</html>
